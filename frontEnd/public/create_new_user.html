<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create New User</title>
   <link rel="stylesheet" href="/assets/css/login_styles.css">
</head>
<body>
    <div class="container">
        <h1>Create New User</h1>
        <form id="createUserForm" class="login-form">
            <label for="username">Username:</label>
            <input type="text" id="username" name="username" required>
            <label for="email">Email:</label>
            <input type="email" id="email" name="email" required>
            <label for="country">Country:</label>
            <input type="text" id="country" name="country" required>
            <label for="state">State:</label>
            <input type="text" id="state" name="state" required>
            <label for="password">Password:</label>
            <input type="password" id="password" name="password" required>
            <label for="reenter_password">Re-enter Password:</label>
            <input type="password" id="reenter_password" name="reenter_password" required>
            <button type="submit">Create Account</button>
        </form>
        <p>Already have an account? <a href="login.html">Go to Login</a></p>
        <div id="message" class="message"></div>
    </div>
    <script src="/assets/js/create_user_script.js"></script>

    
</body>
</html>
